name: Deploy

# Dispara em push na main (deploy automático).
on:
  push:
    branches: [main]

# Evita dois deploys simultâneos; deixa o que está rodando terminar e enfileira o próximo.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1) Validação: build do backend e do frontend no runner do GitHub.
  #    Se qualquer build quebrar, o job de deploy nem começa.
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate build (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        app: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # 2) Deploy: SSH na VPS, atualiza o código, builda e recarrega
  #    backend e frontend via PM2. Só roda se o validate passar.
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            # Shell SSH não-interativo não carrega ~/.bashrc, então Node/npm/pm2
            # podem não estar no PATH. Resolve nvm e os caminhos globais comuns.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$NVM_DIR/versions/node/*/bin:/usr/local/bin:/usr/bin:$HOME/.npm-global/bin:$PATH"
            # Expande o glob do nvm (se houver) para um caminho real
            for d in "$NVM_DIR"/versions/node/*/bin; do [ -d "$d" ] && export PATH="$d:$PATH"; done

            echo "==> Ambiente"
            echo "node: $(command -v node || echo 'NÃO ENCONTRADO')  $(node -v 2>/dev/null)"
            echo "npm:  $(command -v npm  || echo 'NÃO ENCONTRADO')  $(npm -v 2>/dev/null)"
            echo "pm2:  $(command -v pm2  || echo 'NÃO ENCONTRADO')  $(pm2 -v 2>/dev/null)"

            echo "==> Atualizando código em ${{ secrets.VPS_PATH }}"
            cd "${{ secrets.VPS_PATH }}"
            # git é a fonte da verdade (não usa git clean p/ preservar .env e uploads/)
            git fetch --all
            git reset --hard origin/main

            echo "==> Backend: install + build + reload"
            cd backend
            npm ci
            npm run build
            pm2 startOrReload ecosystem.config.cjs --env production

            echo "==> Frontend: install + build + reload"
            cd ../frontend
            npm ci
            npm run build
            pm2 startOrReload ecosystem.config.cjs --env production

            pm2 save
            echo "==> Deploy concluído"
